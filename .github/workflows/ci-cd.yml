name: Django React CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install Backend Dependencies
      run: |
        cd backend
        pip install -r requirements.txt

    - name: Run Django Tests
      run: |
        cd backend
        python manage.py test

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: "22"

    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm install

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Backend Image
      run: docker build -t rahuljobit/django-backend ./backend

    - name: Build Frontend Image
      run: docker build -t rahuljobit/react-frontend ./frontend

    - name: Push Backend Image
      run: docker push rahuljobit/django-backend

    - name: Push Frontend Image
      run: docker push rahuljobit/react-frontend